<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Faradilah 💗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff5f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Georgia, serif;
    }
    canvas { display: block; }
    .title {
      font-size: 15px;
      color: #c4547a;
      letter-spacing: 0.15em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 13px;
      color: #e0829e;
      margin-top: 10px;
      letter-spacing: 0.08em;
    }
    .btn {
      margin-top: 14px;
      padding: 8px 22px;
      border: 1.5px solid #d4537e;
      background: transparent;
      color: #d4537e;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }
    .btn:hover { background: #fbeaf0; }
  </style>
</head>
<body>
  <div class="title">For Faradilah 💗</div>
  <canvas id="c" width="320" height="320"></canvas>
  <div class="subtitle" id="status">menggambar...</div>
  <button class="btn" id="replayBtn" style="display:none" onclick="startDraw()">Ulangi ↺</button>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2 + 10;
    const scale = 11.5;

    function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
    function heartY(t) { return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)); }

    const TOTAL = 2200;
    const lines = [];

    for (let i = 0; i < TOTAL; i++) {
      const t = (i / TOTAL) * Math.PI * 2;
      lines.push([cx + heartX(t) * scale, cy + heartY(t) * scale]);
    }

    let idx = 0;
    let raf = null;

    function startDraw() {
      idx = 0;
      ctx.clearRect(0, 0, W, H);
      document.getElementById('status').textContent = 'menggambar...';
      document.getElementById('replayBtn').style.display = 'none';
      if (raf) cancelAnimationFrame(raf);
      draw();
    }

    function draw() {
      const batch = 18;
      for (let b = 0; b < batch && idx < TOTAL; b++, idx++) {
        const [x, y] = lines[idx];
        const progress = idx / TOTAL;
        const alpha = 0.13 + 0.1 * Math.sin(progress * Math.PI * 8);
        const r = Math.round(180 + 40 * Math.sin(progress * Math.PI));
        const g = Math.round(60 + 30 * Math.sin(progress * Math.PI));
        const bv = Math.round(100 + 30 * Math.sin(progress * Math.PI));
        ctx.strokeStyle = `rgba(${r},${g},${bv},${alpha})`;
        ctx.lineWidth = 0.85;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(cx, cy);
        ctx.stroke();
      }
      if (idx < TOTAL) {
        raf = requestAnimationFrame(draw);
      } else {
        drawOutline();
        document.getElementById('status').textContent = 'untuk kamu 🌸';
        document.getElementById('replayBtn').style.display = 'inline-block';
      }
    }

    function drawOutline() {
      ctx.beginPath();
      for (let i = 0; i <= 300; i++) {
        const t = (i / 300) * Math.PI * 2;
        const x = cx + heartX(t) * scale;
        const y = cy + heartY(t) * scale;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = 'rgba(212,83,126,0.55)';
      ctx.lineWidth = 1.8;
      ctx.stroke();
    }

    startDraw();
  </script>
</body>
</html>
