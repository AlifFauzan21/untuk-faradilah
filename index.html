<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Faradilah 💗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a0a10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Georgia, serif;
    }
    canvas { display: block; border-radius: 16px; }
    .btn {
      margin-top: 18px;
      padding: 12px 32px;
      border: 1.5px solid #e0829e;
      background: transparent;
      color: #e0829e;
      border-radius: 24px;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0.1em;
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(212,83,126,0.15); }
    .hint {
      font-size: 11px;
      color: #7a3a50;
      margin-top: 8px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <button class="btn" id="saveBtn">Simpan sebagai foto 💾</button>
  <div class="hint" id="hint">menggambar dulu...</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const W = 1080, H = 2340;
    canvas.width = W;
    canvas.height = H;

    const maxW = Math.min(window.innerWidth - 40, 360);
    canvas.style.width = maxW + 'px';
    canvas.style.height = (maxW * H / W) + 'px';

    const cx = W / 2;
    const cy = H / 2;
    const scale = 38;

    function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
    function heartY(t) { return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)); }

    function drawBackground() {
      const grad = ctx.createRadialGradient(cx, cy, 100, cx, cy, 900);
      grad.addColorStop(0, '#2d0d1a');
      grad.addColorStop(1, '#0d0208');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      const starPos = [
        [120,200],[300,150],[800,180],[950,300],[200,500],
        [1000,450],[80,900],[1020,800],[150,1800],[900,1900],
        [300,2100],[700,2200],[500,100],[650,400],[400,700],
        [850,1100],[200,1400],[950,1600],[100,2000],[1000,2100]
      ];
      starPos.forEach(([x,y]) => {
        ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random()*0.5})`;
        ctx.beginPath();
        ctx.arc(x, y, Math.random()*2+1, 0, Math.PI*2);
        ctx.fill();
      });
    }

    const TOTAL = 3000;
    const lines = [];
    for (let i = 0; i < TOTAL; i++) {
      const t = (i / TOTAL) * Math.PI * 2;
      lines.push([cx + heartX(t) * scale, cy + heartY(t) * scale]);
    }

    let idx = 0, raf = null, done = false;
    drawBackground();

    function draw() {
      const batch = 40;
      for (let b = 0; b < batch && idx < TOTAL; b++, idx++) {
        const [x, y] = lines[idx];
        const progress = idx / TOTAL;
        const alpha = 0.07 + 0.08 * Math.sin(progress * Math.PI * 10);
        const r = Math.round(200 + 40 * Math.sin(progress * Math.PI));
        const g = Math.round(50 + 40 * Math.sin(progress * Math.PI));
        const bv = Math.round(100 + 40 * Math.sin(progress * Math.PI));
        ctx.strokeStyle = `rgba(${r},${g},${bv},${alpha})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(cx, cy);
        ctx.stroke();
      }
      if (idx < TOTAL) {
        raf = requestAnimationFrame(draw);
      } else {
        drawOutline();
        drawText();
        done = true;
        document.getElementById('hint').textContent = 'selesai! siap disimpan 🌸';
      }
    }

    function drawOutline() {
      ctx.beginPath();
      for (let i = 0; i <= 400; i++) {
        const t = (i / 400) * Math.PI * 2;
        const x = cx + heartX(t) * scale;
        const y = cy + heartY(t) * scale;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = 'rgba(230,100,150,0.7)';
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    function drawText() {
      ctx.textAlign = 'center';

      ctx.fillStyle = 'rgba(240,160,190,0.9)';
      ctx.font = '52px Georgia';
      ctx.fillText('Faradilah', cx, cy - scale * 15 - 60);

      ctx.font = '36px Georgia';
      ctx.fillStyle = 'rgba(200,120,160,0.75)';
      ctx.fillText('dengan sepenuh hati', cx, cy + scale * 15 + 80);

      const now = new Date();
      const tgl = now.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
      ctx.font = '28px Georgia';
      ctx.fillStyle = 'rgba(160,80,110,0.6)';
      ctx.fillText(tgl, cx, cy + scale * 15 + 140);
    }

    draw();

    document.getElementById('saveBtn').addEventListener('click', () => {
      if (!done) {
        document.getElementById('hint').textContent = 'tunggu selesai dulu ya...';
        return;
      }
      const link = document.createElement('a');
      link.download = 'wallpaper_faradilah.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      document.getElementById('hint').textContent = 'berhasil disimpan! 💗';
    });
  </script>
</body>
</html>
